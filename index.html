<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{{ARTICLE_TITLE}}</title>
    <meta name="title" content="{{ARTICLE_TITLE}}">
    <meta name="description" content="{{ARTICLE_DESCRIPTION}}">
    <meta name="author" content="{{AUTHOR_NAME}}">
    <meta name="keywords" content="{{ARTICLE_KEYWORDS}}">
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
    <meta name="google-site-verification" content="k1naFcMKtZ0AU2hjBnyOV0ByIwQiO-JKxBl57AOcdxU">
    <link rel="stylesheet" href="/styles.css"/>
    <meta name="yandex-verification" content="{{YANDEX_VERIFICATION_CODE}}">
    <meta name="theme-color" content="#ffffff">
    <link rel="canonical" href="{{ARTICLE_URL}}">

    <meta property="og:type" content="article">
    <meta property="og:url" content="{{ARTICLE_URL}}">
    <meta property="og:title" content="{{ARTICLE_TITLE}}">
    <meta property="og:description" content="{{ARTICLE_DESCRIPTION}}">
    <meta property="og:image" content="{{OG_IMAGE_URL}}">
    <meta property="og:site_name" content="{{SITE_NAME}}">
    <meta property="og:locale" content="ru_RU">
    <meta property="article:published_time" content="{{PUBLISH_DATE_ISO}}">
    <meta property="article:modified_time" content="{{PUBLISH_DATE_ISO}}">
    <meta property="article:author" content="{{AUTHOR_NAME}}">
    <meta property="article:section" content="Статьи">
    <meta property="article:tag" content="{{ARTICLE_KEYWORDS}}">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="{{ARTICLE_URL}}">
    <meta name="twitter:title" content="{{ARTICLE_TITLE}}">
    <meta name="twitter:description" content="{{ARTICLE_DESCRIPTION}}">
    <meta name="twitter:image" content="{{OG_IMAGE_URL}}">
    <meta name="twitter:creator" content="{{AUTHOR_NAME}}">

    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">



    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@graph": [
            {
                "@type": "Article",
                "headline": {{ARTICLE_TITLE_JSON}},
                "description": {{ARTICLE_DESCRIPTION_JSON}},
                "image": ["{{OG_IMAGE_URL}}"],
                "datePublished": "{{PUBLISH_DATE_ISO}}",
                "dateModified": "{{PUBLISH_DATE_ISO}}",
                "author": {
                    "@type": "Person",
                    "name": {{AUTHOR_NAME_JSON}},
                    "description": {{AUTHOR_DESCRIPTION_JSON}},
                    "image": "{{AUTHOR_AVATAR}}"
                },
                "publisher": {
                    "@type": "Organization",
                    "name": {{SITE_NAME_JSON}},
                    "url": "{{SITE_URL}}",
                    "logo": {
                        "@type": "ImageObject",
                        "url": "{{SITE_URL}}/icon.png"
                    }
                },
                "mainEntityOfPage": {
                    "@type": "WebPage",
                    "@id": "{{ARTICLE_URL}}"
                },
                "articleSection": "Статьи",
                "wordCount": {{WORD_COUNT}},
                "timeRequired": "PT{{READING_TIME}}M",
                "inLanguage": "ru-RU"
            },
            {
                "@type": "Person",
                "@id": "{{ARTICLE_URL}}#author",
                "name": {{AUTHOR_NAME_JSON}},
                "description": {{AUTHOR_DESCRIPTION_JSON}},
                "image": "{{AUTHOR_AVATAR}}",
                "jobTitle": "Эксперт"
            },
            {
                "@type": "BreadcrumbList",
                "itemListElement": [
                    {
                        "@type": "ListItem",
                        "position": 1,
                        "name": {{SITE_NAME_JSON}},
                        "item": "{{SITE_URL}}"
                    },
                    {
                        "@type": "ListItem",
                        "position": 2,
                        "name": "Статьи",
                        "item": "{{SITE_URL}}/articles/"
                    },
                    {
                        "@type": "ListItem",
                        "position": 3,
                        "name": {{ARTICLE_TITLE_JSON}},
                        "item": "{{ARTICLE_URL}}"
                    }
                ]
            },
            {
                "@type": "WebPage",
                "@id": "{{ARTICLE_URL}}#webpage",
                "url": "{{ARTICLE_URL}}",
                "name": {{ARTICLE_TITLE_JSON}},
                "description": {{ARTICLE_DESCRIPTION_JSON}},
                "isPartOf": {
                    "@type": "WebSite",
                    "name": {{SITE_NAME_JSON}},
                    "url": "{{SITE_URL}}"
                },
                "about": {
                    "@type": "Thing",
                    "name": {{ARTICLE_TITLE_JSON}}
                },
                "inLanguage": "ru-RU"
            }
        ]
    }
    </script>
</head>
<body>
    <div class="s-0bec-page-shell">
        <div class="s-0bec-site-topbar" aria-label="Навигация по статье">
            <div class="s-0bec-site-topbar__brand">
                <span class="s-0bec-site-topbar__dot" aria-hidden="true"></span>
                
            </div>
            
        </div>

        <main class="s-0bec-article-layout">
            <article class="s-0bec-article-card" itemscope itemtype="https://schema.org/Article">
                <meta itemprop="headline" content="{{ARTICLE_TITLE}}">
                <meta itemprop="description" content="{{ARTICLE_DESCRIPTION}}">
                <meta itemprop="datePublished" content="{{PUBLISH_DATE_ISO}}">
                <meta itemprop="dateModified" content="{{PUBLISH_DATE_ISO}}">
                <meta itemprop="timeRequired" content="PT{{READING_TIME}}M">
                <meta itemprop="wordCount" content="{{WORD_COUNT}}">
                <meta itemprop="mainEntityOfPage" content="{{ARTICLE_URL}}">

                <header class="s-0bec-hero">
                    <div class="s-0bec-eyebrow-row">
                        
                        
                    </div>

                    <h1 itemprop="headline">{{ARTICLE_TITLE}}</h1>
                    

                    <div class="s-0bec-meta-grid" aria-label="Ключевая информация о статье">

                        <div class="s-0bec-meta-card">
                            <div class="s-0bec-meta-label">Дата публикации</div>
                            <div class="s-0bec-meta-value"><time datetime="{{PUBLISH_DATE_ISO}}">{{PUBLISH_DATE_FORMATTED}}</time></div>
                        </div>
                        <div class="s-0bec-meta-card">
                            <div class="s-0bec-meta-label">Время чтения</div>
                            <div class="s-0bec-meta-value">{{READING_TIME}} мин</div>
                        </div>
                        <div class="s-0bec-meta-card">
                            <div class="s-0bec-meta-label">Объём текста</div>
                            <div class="s-0bec-meta-value">{{WORD_COUNT}} слов</div>
                        </div>
                    </div>

                    <section class="s-0bec-author-box" itemscope itemtype="https://schema.org/Person" itemprop="author">
                        <div class="s-0bec-author-avatar">
                            <img
                                src="{{AUTHOR_AVATAR}}"
                                alt="{{AUTHOR_NAME}}"
                                itemprop="image"
                                onerror="this.src='https://ui-avatars.com/api/?name={{AUTHOR_NAME_ENCODED}}&size=160&background=f1f5f9&color=111827&bold=true'"
                            >
                        </div>
                        <div class="s-0bec-author-info">
                            <div class="s-0bec-author-name-row">
                                <div class="s-0bec-author-name" itemprop="name">{{AUTHOR_NAME}}</div>
                                <div class="s-0bec-author-badge" itemprop="jobTitle">Эксперт</div>
                            </div>
                            <p class="s-0bec-author-description" itemprop="description">{{AUTHOR_DESCRIPTION}}</p>
                        </div>
                    </section>
                </header>

                <div class="s-0bec-article-body">
                    <div class="s-0bec-article-content">

                        <div class="s-0bec-notion-prose" itemprop="articleBody">
                            {{ARTICLE_HTML_CONTENT}}
                        </div>
                    </div>
                </div>
            </article>

            <section class="s-0bec-table-card s-0bec-table-section" aria-labelledby="comparison-title">
                <div class="s-0bec-section-head">
                    <h2 id="s-0bec-comparison-title">Таблица сравнения</h2>

                </div>

                <div class="s-0bec-table-wrap">
                    {{TABLE_CONTENT}}
                </div>
            </section>

            <footer class="s-0bec-footer-card s-0bec-article-footer">
                <div class="s-0bec-footer-inner">
                    <p>&copy; {{CURRENT_YEAR}}</p>
                   
                </div>
            </footer>
        </main>
    </div>


</body>
</html>
